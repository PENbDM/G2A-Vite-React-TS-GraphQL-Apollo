type Game {
    id: String
    title: String
    description: String
    price: Float
    oldPrice: Float
    discount: Int
    isBestSeller: Boolean
    imgUrl:String
    edition:String
    platform: String
    region: String
    type: String
}

type Query {
    # users
    allUsers: [User!]!
    getUser(id: ID!): User

    # games ✅ add these
    allGames: [Game!]!
    getGame(id: ID!): Game
}


type Mutation{
    register(email:String!,password:String!):AuthPayLoad!
    login(email:String!,password:String!):AuthPayLoad!
}

type AuthPayLoad {
    token: String!
    user: User!
}
type User {
    id: ID!
    email: String!
}

enum OrderStatus {
    PENDING
    PAID
    SHIPPED
    COMPLETED
    CANCELLED
}

type Order {
    id: ID!
    userId: String!
    total: Float!
    status: OrderStatus!
    createdAt: String!
    items: [OrderItem!]!
}

type OrderItem {
    id: ID!
    amount: Int!
    price: Float!
    game: Game!
}

input OrderItemInput {
    gameId: String!
    amount: Int!
    price: Float!
}

type Query {
    getOrdersByUserId(userId: String!): [Order!]!
}

type Mutation {
    makeOrder(userId: String!,total:Float!, items: [OrderItemInput!]!): Order!
}